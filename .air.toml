# Air 配置文件 - 用于 Go 后端热更新

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # 编译命令
  cmd = "go build -o ./tmp/main.exe ."
  # 运行编译后的二进制文件
  bin = "./tmp/main.exe"
  # 监听的文件扩展名
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "json", "env"]
  # 忽略的目录
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "web", "data", ".git"]
  # 发生更改后延迟编译的时间（毫秒）
  delay = 1000
  # 发生编译错误时停止运行旧的二进制文件
  stop_on_error = true
  # 启动时的环境变量
  log = "air.log"

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # 退出时清理 tmp 目录
  clean_on_exit = true
